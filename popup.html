<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu Image Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-title {
      color: white;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .body {
      padding: 14px 16px;
    }

    .info-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 13px;
      color: #333;
      font-weight: 500;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 7px 10px;
      word-break: break-all;
      margin-bottom: 12px;
    }

    .btn-settings {
      display: block;
      width: 100%;
      padding: 9px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-settings:hover {
      background: #e55a28;
    }

    .tip {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="14" height="14">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
      </svg>
    </div>
    <span class="header-title">Temu Image Downloader</span>
  </div>

  <div class="body">
    <div class="info-label">保存到</div>
    <div class="info-value" id="current-folder">Temu</div>

    <button class="btn-settings" id="open-settings">⚙ 打开设置</button>

    <p class="tip">悬停商品图片<br>点击下载按钮即可保存</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
